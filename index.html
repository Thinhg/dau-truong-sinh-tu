<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đấu Trường Sinh Tử - Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin: 0;
            background-color: #111827;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .pixel-font { font-family: 'Press Start 2P', cursive; }

        #game-view { display: none; position: relative; width: 100%; height: 100vh; background: #1a202c; align-items: center; justify-content: center; }
        canvas { display: block; image-rendering: pixelated; box-shadow: 0 0 20px rgba(0,0,0,0.8); border: 4px solid #4a5568; }

        .game-ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; justify-content: center; align-items: center; }
        .health-bar-container { position: absolute; top: 20px; width: 800px; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; }
        .health-bar-bg { width: 40%; height: 25px; background-color: #e53e3e; border: 3px solid white; position: relative; display: flex; }
        #player-health-bg { justify-content: flex-end; }
        #enemy-health-bg { justify-content: flex-start; }
        .health-bar { height: 100%; background-color: #38a169; width: 100%; transition: width 0.1s linear; }
        .health-bar-smooth { position: absolute; height: 100%; background-color: #ecc94b; width: 100%; transition: width 0.5s ease-out; z-index: -1; }
        .player-name-tag { position: absolute; top: -25px; font-size: 12px; font-weight: bold; text-shadow: 1px 1px 2px black; }
        
        #timer { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background-color: rgba(0,0,0,0.8); padding: 10px; border: 2px solid white; font-size: 20px; z-index: 10; min-width: 60px; text-align: center; }
        #match-msg { position: absolute; font-size: 40px; color: white; text-shadow: 3px 3px 0 #000; text-align: center; display: none; }

        #dashboard { display: flex; width: 100%; height: 100%; padding: 20px; gap: 20px; box-sizing: border-box; }
        .panel { background: rgba(31, 41, 55, 0.9); border: 2px solid #374151; border-radius: 10px; padding: 15px; display: flex; flex-direction: column; }
        
        .left-col { flex: 1; display: flex; flex-direction: column; gap: 20px; min-width: 250px; }
        #chat-box { flex: 1; overflow-y: auto; background: #111827; padding: 10px; border-radius: 5px; font-size: 14px; margin-bottom: 10px; }
        #leaderboard-list { flex: 1; overflow-y: auto; background: #111827; padding: 10px; border-radius: 5px; font-size: 14px; }
        
        .center-col { flex: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        
        .right-col { flex: 1; display: flex; flex-direction: column; gap: 20px; min-width: 300px; }
        .shop-item, .quest-item { background: #374151; padding: 10px; border-radius: 5px; margin-bottom: 10px; }

        .btn { padding: 10px 20px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.2s; text-align: center; border: none; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }
        .btn-disabled { background: #6b7280; color: #d1d5db; cursor: not-allowed; }

        #name-modal, #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111827; display: flex; justify-content: center; align-items: center; z-index: 200; flex-direction: column; }
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid #3b82f6; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="loader"></div>
        <h2 class="pixel-font mt-4 text-xl">ĐANG KẾT NỐI MÁY CHỦ...</h2>
        <p class="mt-2 text-gray-400 text-sm">Vui lòng đợi cấu hình Firebase</p>
    </div>

    <div id="name-modal" style="display: none;">
        <div class="bg-gray-800 p-8 rounded-lg text-center border-2 border-blue-500 w-96">
            <h2 class="pixel-font text-2xl mb-4 text-blue-400">TẠO NHÂN VẬT</h2>
            <input type="text" id="player-name-input" placeholder="Nhập tên của bạn..." class="w-full p-3 bg-gray-900 border border-gray-600 rounded text-white mb-4 outline-none focus:border-blue-500" maxlength="15">
            <button onclick="saveName()" class="btn btn-primary w-full pixel-font">VÀO GAME</button>
        </div>
    </div>

    <div id="dashboard" style="display: none;">
        <div class="left-col">
            <div class="panel flex-1">
                <h3 class="text-lg font-bold mb-2 text-yellow-400 border-b border-gray-600 pb-2">💬 Kênh Thế Giới</h3>
                <div id="chat-box" class="flex flex-col gap-2"></div>
                <div class="flex gap-2">
                    <input type="text" id="chat-input" class="flex-1 bg-gray-900 p-2 rounded border border-gray-600 text-white outline-none" placeholder="Chat..." onkeypress="if(event.key === 'Enter') sendChat()">
                    <button onclick="sendChat()" class="btn btn-primary px-3">Gửi</button>
                </div>
            </div>
            <div class="panel h-1/2">
                <h3 class="text-lg font-bold mb-2 text-blue-400 border-b border-gray-600 pb-2">🏆 Bảng Xếp Hạng</h3>
                <div id="leaderboard-list" class="flex flex-col gap-2"></div>
            </div>
        </div>

        <div class="center-col panel">
            <h1 class="pixel-font text-4xl text-red-500 mb-2 drop-shadow-lg">ĐẤU TRƯỜNG</h1>
            <h1 class="pixel-font text-4xl text-white mb-8 drop-shadow-lg">SINH TỬ</h1>
            
            <div class="bg-gray-900 p-6 rounded-lg border border-gray-700 w-full max-w-md mb-8">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-xl font-bold" id="ui-player-name">...</span>
                </div>
                <div class="flex justify-between items-center mb-2">
                    <span class="text-gray-400">Rank:</span>
                    <span id="ui-rank-name" class="font-bold text-yellow-400 text-lg">Đồng</span>
                </div>
                <div class="w-full bg-gray-800 rounded-full h-2 mb-1">
                    <div id="ui-rank-progress" class="bg-yellow-400 h-2 rounded-full" style="width: 0%"></div>
                </div>
                <div class="text-right text-xs text-gray-400"><span id="ui-rp">0</span> RP</div>
            </div>

            <button onclick="startMatchmaking()" class="btn btn-danger w-full max-w-md py-4 text-xl pixel-font mb-4">⚔️ TÌM ĐỐI THỦ</button>
            <button onclick="startPractice()" class="btn btn-success w-full max-w-md py-3 text-lg mb-4">🎯 LUYỆN TẬP (BOT)</button>
            
            <div id="matchmaking-status" class="text-yellow-400 animate-pulse mt-4 hidden">Đang tìm đối thủ... <button onclick="cancelMatchmaking()" class="ml-2 text-red-400 underline cursor-pointer border-none bg-transparent">Hủy</button></div>
            <div class="mt-4 text-sm text-gray-400">Cách chơi: W A D để di chuyển/nhảy. Phím SPACE để Chém.</div>
        </div>

        <div class="right-col">
            <div class="panel flex-1">
                <div class="flex justify-between items-center border-b border-gray-600 pb-2 mb-2">
                    <h3 class="text-lg font-bold text-green-400">📜 Nhiệm Vụ</h3>
                    <span class="text-yellow-400 font-bold font-mono text-lg">💰 <span id="ui-gold">0</span></span>
                </div>
                <div id="quest-list" class="overflow-y-auto flex-1"></div>
                <button onclick="generateQuests()" class="btn btn-primary mt-2 text-xs">Làm mới nhiệm vụ</button>
            </div>
            <div class="panel flex-1">
                <h3 class="text-lg font-bold text-purple-400 border-b border-gray-600 pb-2 mb-2">🗡️ Cửa Hàng</h3>
                <div id="shop-list" class="overflow-y-auto flex-1"></div>
            </div>
        </div>
    </div>

    <div id="game-view">
        <div class="game-ui-layer">
            <div class="health-bar-container">
                <div class="health-bar-bg" id="player-health-bg">
                    <div class="player-name-tag text-blue-400 left-0" id="game-name-p1">Player 1</div>
                    <div class="health-bar-smooth" id="player-health-smooth"></div>
                    <div class="health-bar" id="player-health"></div>
                </div>
                <div class="health-bar-bg" id="enemy-health-bg">
                    <div class="player-name-tag text-red-400 right-0" id="game-name-p2">Player 2</div>
                    <div class="health-bar-smooth" id="enemy-health-smooth"></div>
                    <div class="health-bar" id="enemy-health"></div>
                </div>
            </div>
            <div id="timer" class="pixel-font">60</div>
            <div id="match-msg" class="pixel-font"></div>
        </div>
        <canvas id="gameCanvas" width="1024" height="576"></canvas>
        <button onclick="exitGame()" class="absolute top-5 left-5 btn btn-danger z-50">Thoát / Đầu Hàng</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // ==========================================
    // BƯỚC 4: DÁN CẤU HÌNH FIREBASE CỦA BẠN VÀO ĐÂY
    // ==========================================
    const myCustomFirebaseConfig = {
        // Xóa dòng dưới và dán config của bạn vào
        apiKey: "AIzaSyDx5864sZLFO9bc53c1NXVajpsnDmJATt0",
        authDomain: "dautruongsinhtu-1f918.firebaseapp.com",
        projectId: "dautruongsinhtu-1f918",
        storageBucket: "dautruongsinhtu-1f918.firebasestorage.app",
        messagingSenderId: "808073077596",
        appId: "1:808073077596:web:9403f102586d33bd4d9799"
    };

    // Kiểm tra xem đang chạy trên môi trường test hay trên web của bạn
    const isLocalTest = typeof __firebase_config !== 'undefined';
    const finalConfig = isLocalTest ? JSON.parse(__firebase_config) : myCustomFirebaseConfig;
    const appId = isLocalTest ? __app_id : 'global_game';

    // Khởi tạo Firebase
    let app, auth, db;
    try {
        if (!finalConfig.apiKey) finalConfig.apiKey = ""; // Mặc định cho nền tảng
        app = initializeApp(finalConfig);
        auth = getAuth(app);
        db = getFirestore(app);
    } catch (e) {
        console.error("Lỗi cấu hình Firebase:", e);
    }

    // ==========================================
    // LOGIC GAME CHÍNH
    // ==========================================

    const SWORDS = {
        wood: { id: 'wood', name: 'Kiếm Gỗ', damage: 5, cost: 0, color: '#a1662f', width: 50 },
        iron: { id: 'iron', name: 'Kiếm Sắt', damage: 10, cost: 100, color: '#cbd5e0', width: 60 },
        blood: { id: 'blood', name: 'Huyết Kiếm', damage: 15, cost: 500, color: '#e53e3e', width: 70 },
        holy: { id: 'holy', name: 'Thánh Kiếm', damage: 25, cost: 1500, color: '#ecc94b', width: 80 }
    };

    const RANKS = [
        { name: 'Đồng', minRP: 0, color: '#b08d57' }, { name: 'Bạc', minRP: 100, color: '#c0c0c0' },
        { name: 'Vàng', minRP: 300, color: '#ffd700' }, { name: 'Bạch Kim', minRP: 600, color: '#e5e4e2' },
        { name: 'Kim Cương', minRP: 1000, color: '#b9f2ff' }, { name: 'Thách Đấu', minRP: 1500, color: '#ff4b4b' }
    ];

    let currentUser = null;
    let myProfile = { name: '', rp: 0, gold: 0, sword: 'wood', quests: [], ownedSwords: ['wood'] };
    let gameState = 'dashboard'; 
    let currentRoomId = null;
    let isHost = true;
    let unsubs = [];

    // Helper: Định tuyến đường dẫn Database (để tương thích mọi nơi)
    // QUAN TRỌNG: Phải dùng user collection cá nhân cho user data để tránh lỗi Permission
    const getPublicPath = (col) => collection(db, 'artifacts', appId, 'public', 'data', col);
    const getPublicDocPath = (col, docId) => doc(db, 'artifacts', appId, 'public', 'data', col, docId);
    
    const getPrivatePath = (col) => collection(db, 'artifacts', appId, 'users', currentUser.uid, col);
    const getPrivateDocPath = (col, docId) => doc(db, 'artifacts', appId, 'users', currentUser.uid, col, docId);

    if (auth) {
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Lỗi đăng nhập:", err);
            }
        };
        initAuth();

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                // Lấy thông tin user từ collection private của user đó
                const userRef = getPrivateDocPath('profile', 'data');
                try {
                    const docSnap = await getDoc(userRef);
                    if (docSnap.exists()) {
                        myProfile = docSnap.data();
                        if(!myProfile.ownedSwords) myProfile.ownedSwords = ['wood'];
                        document.getElementById('loading-overlay').style.display = 'none';
                        document.getElementById('dashboard').style.display = 'flex';
                        updateDashboardUI();
                        setupRealtimeListeners();
                    } else {
                        document.getElementById('loading-overlay').style.display = 'none';
                        document.getElementById('name-modal').style.display = 'flex';
                    }
                } catch(e) {
                    console.error("Lỗi lấy thông tin user:", e);
                    // Fallback to name modal if error occurs (e.g. first time)
                    document.getElementById('loading-overlay').style.display = 'none';
                    document.getElementById('name-modal').style.display = 'flex';
                }
            }
        });
    }

    window.saveName = async () => {
        const name = document.getElementById('player-name-input').value.trim();
        if (!name || !currentUser) return;
        myProfile.name = name;
        myProfile.uid = currentUser.uid; // Lưu uid để dùng cho bảng xếp hạng public
        if(myProfile.quests.length === 0) generateNewQuestsLocal();
        
        try {
            // Lưu vào private collection cho profile cá nhân
            await setDoc(getPrivateDocPath('profile', 'data'), myProfile);
            
            // Lưu bản sao vào public collection để hiện lên bảng xếp hạng
            await setDoc(getPublicDocPath('leaderboard', currentUser.uid), {
                name: myProfile.name,
                rp: myProfile.rp,
                uid: currentUser.uid
            });

            document.getElementById('name-modal').style.display = 'none';
            document.getElementById('dashboard').style.display = 'flex';
            updateDashboardUI();
            setupRealtimeListeners();
        } catch (e) {
            console.error("Lỗi khi tạo nhân vật:", e);
        }
    }

    async function saveProfileData() {
        if (!currentUser) return;
        try {
            await updateDoc(getPrivateDocPath('profile', 'data'), myProfile);
            // Cập nhật lại RP trên bảng xếp hạng public
            await updateDoc(getPublicDocPath('leaderboard', currentUser.uid), {
                rp: myProfile.rp
            });
            updateDashboardUI();
        } catch (e) {
             console.error("Lỗi khi lưu dữ liệu:", e);
        }
    }

    function updateDashboardUI() {
        document.getElementById('ui-player-name').innerText = myProfile.name;
        document.getElementById('ui-gold').innerText = myProfile.gold;
        document.getElementById('ui-rp').innerText = myProfile.rp;
        
        let currentRank = RANKS[0], nextRank = RANKS[1];
        for (let i = 0; i < RANKS.length; i++) {
            if (myProfile.rp >= RANKS[i].minRP) { currentRank = RANKS[i]; nextRank = RANKS[i+1] || null; }
        }
        
        document.getElementById('ui-rank-name').innerText = currentRank.name;
        document.getElementById('ui-rank-name').style.color = currentRank.color;
        
        const prog = nextRank ? ((myProfile.rp - currentRank.minRP) / (nextRank.minRP - currentRank.minRP)) * 100 : 100;
        document.getElementById('ui-rank-progress').style.width = `${Math.max(0, Math.min(100, prog))}%`;
        document.getElementById('ui-rank-progress').style.backgroundColor = currentRank.color;

        renderShop();
        renderQuests();
    }

    function setupRealtimeListeners() {
        if (!currentUser) return;
        // Bảng xếp hạng từ public collection
        unsubs.push(onSnapshot(getPublicPath('leaderboard'), (snapshot) => {
            let users = [];
            snapshot.forEach(d => users.push({id: d.id, ...d.data()}));
            users.sort((a, b) => (b.rp || 0) - (a.rp || 0));
            
            const lbList = document.getElementById('leaderboard-list');
            lbList.innerHTML = '';
            users.slice(0, 50).forEach((u, i) => {
                let rankC = RANKS.reduce((acc, r) => u.rp >= r.minRP ? r.color : acc, RANKS[0].color);
                lbList.innerHTML += `<div class="flex justify-between items-center py-1 border-b border-gray-800">
                    <span class="text-gray-400 w-6">${i + 1}.</span>
                    <span class="flex-1 truncate ${u.id === currentUser.uid ? 'text-white font-bold' : 'text-gray-300'}">${u.name}</span>
                    <span class="font-mono text-sm" style="color: ${rankC}">${u.rp || 0} RP</span></div>`;
            });
        }, e => { console.error("Lỗi Leaderboard:", e) }));

        // Chat từ public collection
        unsubs.push(onSnapshot(getPublicPath('chat'), (snapshot) => {
            let msgs = [];
            snapshot.forEach(d => msgs.push(d.data()));
            msgs.sort((a, b) => a.time - b.time);
            
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = msgs.slice(-30).map(m => 
                `<div class="mb-1"><span class="${m.uid === currentUser.uid ? 'text-yellow-400' : 'text-blue-400'} font-bold">[${m.name}]</span>: <span class="text-gray-200">${m.text}</span></div>`
            ).join('');
            chatBox.scrollTop = chatBox.scrollHeight;
        }, e => { console.error("Lỗi Chat:", e) }));
    }

    window.sendChat = async () => {
        const text = document.getElementById('chat-input').value.trim();
        if(!text || !currentUser) return;
        document.getElementById('chat-input').value = '';
        try {
            await addDoc(getPublicPath('chat'), { name: myProfile.name, uid: currentUser.uid, text: text, time: Date.now() });
        } catch(e) { console.error("Lỗi gửi chat:", e) }
    }

    function generateNewQuestsLocal() {
        const types = [
            { type: 'play', desc: 'Chơi 1 trận', target: 1, reward: 50 },
            { type: 'win', desc: 'Thắng 1 trận Rank', target: 1, reward: 150 },
            { type: 'damage', desc: 'Gây 500 sát thương', target: 500, reward: 100 }
        ];
        myProfile.quests = [types[0], types[1], types[2]].map(q => ({...q, current: 0, claimed: false}));
    }

    window.generateQuests = () => { generateNewQuestsLocal(); saveProfileData(); }

    function renderQuests() {
        const qList = document.getElementById('quest-list');
        qList.innerHTML = myProfile.quests.map((q, i) => {
            let prog = Math.min(q.current, q.target);
            let btn = q.claimed ? `<span class="text-green-500 text-xs">Đã nhận</span>` : 
                     (prog >= q.target ? `<button onclick="claimQuest(${i})" class="btn btn-success text-xs p-1">Nhận ${q.reward}G</button>` : 
                     `<span class="text-gray-400 text-xs">${prog}/${q.target}</span>`);
            return `<div class="quest-item flex justify-between items-center"><div class="text-sm"><div>${q.desc}</div><div class="w-full bg-gray-700 h-1 mt-1"><div class="bg-blue-400 h-1" style="width: ${(prog/q.target)*100}%"></div></div></div>${btn}</div>`;
        }).join('');
    }

    window.claimQuest = (i) => {
        let q = myProfile.quests[i];
        if(q.current >= q.target && !q.claimed) { q.claimed = true; myProfile.gold += q.reward; saveProfileData(); }
    }

    function updateQuest(type, amount) {
        let updated = false;
        myProfile.quests.forEach(q => {
            if(q.type === type && !q.claimed && q.current < q.target) { q.current += amount; updated = true; }
        });
        if(updated) saveProfileData();
    }

    function renderShop() {
        document.getElementById('shop-list').innerHTML = Object.values(SWORDS).map(s => {
            const isEq = myProfile.sword === s.id;
            const isOw = myProfile.ownedSwords.includes(s.id);
            const canBuy = myProfile.gold >= s.cost;
            let btn = isEq ? `<button class="btn btn-disabled text-xs p-1">Đang Dùng</button>` :
                      isOw ? `<button onclick="equip('${s.id}')" class="btn btn-primary text-xs p-1">Trang Bị</button>` :
                      `<button onclick="buy('${s.id}')" class="btn ${canBuy?'btn-success':'btn-disabled'} text-xs p-1">${s.cost} G</button>`;
            return `<div class="shop-item border-l-4" style="border-color: ${s.color}"><div><div class="font-bold text-sm" style="color: ${s.color}">${s.name}</div><div class="text-xs text-gray-400">ST: ${s.damage} | Dài: ${s.width}</div></div>${btn}</div>`;
        }).join('');
    }

    window.equip = (id) => { myProfile.sword = id; saveProfileData(); }
    window.buy = (id) => {
        if(myProfile.gold >= SWORDS[id].cost) {
            myProfile.gold -= SWORDS[id].cost;
            myProfile.ownedSwords.push(id);
            myProfile.sword = id;
            saveProfileData();
        }
    }

    // --- MULTIPLAYER LOGIC ---
    let roomUnsub = null;
    let syncInterval = null;

    window.startMatchmaking = async () => {
        if(!currentUser) return;
        gameState = 'matchmaking';
        document.getElementById('matchmaking-status').style.display = 'block';
        document.querySelector('.center-col button').disabled = true;

        const queueDoc = getPublicDocPath('rooms', 'global_queue');
        try {
            const docSnap = await getDoc(queueDoc);
            if (docSnap.exists() && docSnap.data().state === 'waiting' && docSnap.data().p1 !== currentUser.uid) {
                // Join as Player 2
                isHost = false;
                currentRoomId = 'global_queue';
                await updateDoc(queueDoc, { p2: currentUser.uid, p2Name: myProfile.name, p2Sword: myProfile.sword, state: 'playing' });
                startGame('ranked', docSnap.data());
            } else {
                // Host Room
                isHost = true;
                currentRoomId = 'global_queue';
                await setDoc(queueDoc, { p1: currentUser.uid, p1Name: myProfile.name, p1Sword: myProfile.sword, state: 'waiting' });
                roomUnsub = onSnapshot(queueDoc, snap => {
                    if(snap.exists() && snap.data().state === 'playing') {
                        if(roomUnsub) roomUnsub();
                        startGame('ranked', snap.data());
                    }
                }, e=>{ console.error("Lỗi ghép trận:", e)});
            }
        } catch(e) { 
            console.error("Lỗi matchmaking:", e);
            cancelMatchmaking(); 
        }
    }

    window.cancelMatchmaking = () => {
        gameState = 'dashboard';
        document.getElementById('matchmaking-status').style.display = 'none';
        document.querySelector('.center-col button').disabled = false;
        if(roomUnsub) roomUnsub();
    }

    // --- GAME ENGINE ---
    const canvasEl = document.getElementById('gameCanvas');
    const ctx = canvasEl.getContext('2d');
    let p1, p2, loopId, particles = [], timer = 60, timerId, gameEnded = false;

    class Fighter {
        constructor(x, color, faceRight, swordId, isLocal) {
            this.pos = {x, y:0}; this.vel = {x:0, y:0};
            this.w = 50; this.h = 120; this.color = color;
            this.sword = SWORDS[swordId] || SWORDS.wood;
            this.attackBox = { pos: {x, y:0}, w: this.sword.width, h: 50, offY: 30 };
            this.isAtk = false; this.hp = 100; this.faceRight = faceRight;
            this.cd = false; this.flicker = 0; this.sAngle = 0;
            this.isLocal = isLocal; this.targetX = x; this.targetY = 0;
        }
        draw() {
            ctx.fillStyle = this.flicker > 0 ? 'white' : this.color;
            if(this.flicker>0) this.flicker--;
            ctx.fillRect(this.pos.x, this.pos.y, this.w, this.h);
            ctx.save();
            ctx.translate(this.pos.x + this.w/2, this.pos.y + this.h/2);
            let tAng = this.isAtk ? (this.faceRight ? 1.5 : -1.5) : (this.faceRight ? -0.5 : 0.5);
            this.sAngle += (tAng - this.sAngle) * 0.4;
            ctx.rotate(this.sAngle);
            ctx.fillStyle = this.sword.color; ctx.fillRect(0, -5, this.sword.width, 10);
            ctx.fillStyle = '#718096'; ctx.fillRect(-15, -6, 15, 12);
            ctx.restore();
        }
        update() {
            this.draw();
            if(!this.isLocal && gameState === 'playing_ranked') {
                this.pos.x += (this.targetX - this.pos.x) * 0.3;
                this.pos.y += (this.targetY - this.pos.y) * 0.3;
            } else {
                this.pos.x += this.vel.x; this.pos.y += this.vel.y;
                if(this.pos.x < 0) this.pos.x = 0;
                if(this.pos.x + this.w > canvasEl.width) this.pos.x = canvasEl.width - this.w;
                if(this.pos.y + this.h + this.vel.y >= 526) { this.vel.y = 0; this.pos.y = 526 - this.h; }
                else this.vel.y += 0.7;
                this.vel.x *= 0.85;
            }
            this.attackBox.pos.x = this.faceRight ? this.pos.x + this.w : this.pos.x - this.attackBox.w;
            this.attackBox.pos.y = this.pos.y + this.attackBox.offY;
        }
        attack() {
            if(this.cd || this.hp <= 0) return;
            this.isAtk = true; this.cd = true;
            setTimeout(()=>this.isAtk = false, 100);
            setTimeout(()=>this.cd = false, 400);
        }
        takeDmg(amt, dir) {
            if(this.hp <= 0) return;
            this.hp = Math.max(0, this.hp - amt);
            this.flicker = 10;
            if(this.isLocal || gameState === 'playing_practice') { this.vel.x = dir * 15; this.vel.y = -5; }
            for(let i=0;i<10;i++) particles.push({ x: this.pos.x+25, y: this.pos.y+60, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15, r: Math.random()*3+1, c: Math.random()>0.5?this.color:'#fff', a: 1 });
        }
    }

    window.startPractice = () => {
        gameState = 'playing_practice';
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('game-view').style.display = 'flex';
        document.getElementById('game-name-p1').innerText = myProfile.name;
        document.getElementById('game-name-p2').innerText = "Bot Luyện Tập";
        p1 = new Fighter(200, '#3182ce', true, myProfile.sword, true);
        p2 = new Fighter(700, '#e53e3e', false, 'wood', false);
        initMatch();
    }

    function startGame(mode, roomData) {
        gameState = 'playing_ranked';
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('matchmaking-status').style.display = 'none';
        document.getElementById('game-view').style.display = 'flex';
        
        document.getElementById('game-name-p1').innerText = isHost ? myProfile.name : roomData.p1Name;
        document.getElementById('game-name-p2').innerText = isHost ? roomData.p2Name : myProfile.name;

        p1 = new Fighter(200, isHost?'#3182ce':'#e53e3e', true, isHost?myProfile.sword:roomData.p1Sword, isHost);
        p2 = new Fighter(700, isHost?'#e53e3e':'#3182ce', false, isHost?roomData.p2Sword:myProfile.sword, !isHost);

        const roomRef = getPublicDocPath('rooms', currentRoomId);
        
        // Gửi dữ liệu vị trí lên Server 10 lần/s
        syncInterval = setInterval(() => {
            if(gameEnded) return;
            let me = isHost ? p1 : p2;
            let data = {};
            data[isHost ? 'p1State' : 'p2State'] = { x: me.pos.x, y: me.pos.y, hp: me.hp, atk: me.isAtk };
            updateDoc(roomRef, data).catch(e=>{});
        }, 100);

        // Nhận dữ liệu đối thủ
        roomUnsub = onSnapshot(roomRef, snap => {
            if(snap.exists() && !gameEnded) {
                let data = snap.data();
                let opp = isHost ? p2 : p1;
                let oppState = isHost ? data.p2State : data.p1State;
                if(oppState) {
                    opp.targetX = oppState.x; opp.targetY = oppState.y;
                    if(oppState.atk && !opp.isAtk) opp.attack();
                    if(oppState.hp < opp.hp) opp.takeDmg(opp.hp - oppState.hp, opp.faceRight ? -1 : 1);
                }
            }
        }, e=>{});

        initMatch();
    }

    function initMatch() {
        timer = 60; gameEnded = false; particles = [];
        document.getElementById('match-msg').style.display = 'none';
        updateUI(); loopTimer(); loop();
    }

    const keys = { a: false, d: false, w: false, space: false };
    
    function loop() {
        if(gameState === 'dashboard') return;
        loopId = requestAnimationFrame(loop);
        
        let grd = ctx.createLinearGradient(0, 0, 0, 576);
        grd.addColorStop(0, "#1a202c"); grd.addColorStop(1, "#2d3748");
        ctx.fillStyle = grd; ctx.fillRect(0, 0, 1024, 576);
        ctx.fillStyle = '#4a5568'; ctx.fillRect(0, 526, 1024, 50);

        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            if (p.a <= 0) particles.splice(i, 1);
            else {
                ctx.globalAlpha = p.a; ctx.fillStyle = p.c; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
                p.x += p.vx; p.y += p.vy; p.vy += 0.35; p.vx *= 0.95; p.vy *= 0.95; p.a -= 0.02;
            }
        }
        ctx.globalAlpha = 1;

        p1.update(); p2.update();

        if(!gameEnded) {
            let me = (gameState==='playing_practice' || isHost) ? p1 : p2;
            let opp = (gameState==='playing_practice' || isHost) ? p2 : p1;

            me.faceRight = me.pos.x < opp.pos.x;
            if(!opp.isLocal) opp.faceRight = opp.pos.x < me.pos.x;

            if(keys.a) me.vel.x = -8;
            if(keys.d) me.vel.x = 8;
            
            if(keys.space && !me.isAtk && !me.cd) {
                me.attack();
                if(me.attackBox.pos.x + me.attackBox.w >= opp.pos.x && me.attackBox.pos.x <= opp.pos.x + opp.w &&
                   me.attackBox.pos.y + me.attackBox.h >= opp.pos.y && me.attackBox.pos.y <= opp.pos.y + opp.h) {
                    opp.takeDmg(me.sword.damage, me.faceRight ? 1 : -1);
                    updateQuest('damage', me.sword.damage);
                    updateUI();
                    if(gameState === 'playing_practice') {
                        updateQuest('practice', 1);
                        if(opp.hp <= 0) setTimeout(() => { opp.hp = 100; updateUI(); }, 1000);
                    }
                }
            }
            keys.space = false;

            if(gameState === 'playing_ranked' && (p1.hp <= 0 || p2.hp <= 0)) handleEnd();
        }
    }

    function updateUI() {
        document.getElementById('player-health').style.width = p1.hp + '%';
        document.getElementById('enemy-health').style.width = p2.hp + '%';
        setTimeout(() => {
            document.getElementById('player-health-smooth').style.width = p1.hp + '%';
            document.getElementById('enemy-health-smooth').style.width = p2.hp + '%';
        }, 200);
    }

    function loopTimer() {
        if(gameState === 'dashboard') return;
        if(timer > 0) {
            timerId = setTimeout(loopTimer, 1000);
            document.getElementById('timer').innerText = --timer;
        } else if(!gameEnded) handleEnd();
    }

    function handleEnd() {
        gameEnded = true; clearTimeout(timerId);
        let msg = "HÒA NHAU";
        
        if(gameState === 'playing_ranked') {
            updateQuest('play', 1);
            let me = isHost ? p1 : p2;
            let opp = isHost ? p2 : p1;
            if(me.hp > opp.hp) { msg = "THẮNG!"; myProfile.rp += 25; myProfile.gold += 50; updateQuest('win', 1); }
            else if(me.hp < opp.hp) { msg = "THUA!"; myProfile.rp = Math.max(0, myProfile.rp - 15); }
            saveProfileData();
        } else msg = "HẾT GIỜ";
        
        let mEl = document.getElementById('match-msg');
        mEl.innerText = msg; mEl.style.display = 'block'; mEl.style.color = msg==='THẮNG!'?'#38a169':'#e53e3e';
    }

    window.exitGame = () => {
        gameState = 'dashboard';
        cancelAnimationFrame(loopId); clearTimeout(timerId);
        if(syncInterval) clearInterval(syncInterval);
        if(roomUnsub) roomUnsub();
        document.getElementById('game-view').style.display = 'none';
        document.getElementById('dashboard').style.display = 'flex';
        document.querySelector('.center-col button').disabled = false;
        updateDashboardUI();
    }

    window.addEventListener('keydown', e => {
        if(gameState === 'dashboard' || gameEnded) return;
        if(e.key.toLowerCase()==='a') keys.a = true;
        if(e.key.toLowerCase()==='d') keys.d = true;
        if(e.key.toLowerCase()==='w' && ((isHost || gameState==='playing_practice')?p1:p2).vel.y === 0) ((isHost || gameState==='playing_practice')?p1:p2).vel.y = -15;
        if(e.code==='Space') { keys.space = true; e.preventDefault(); }
    });
    window.addEventListener('keyup', e => {
        if(e.key.toLowerCase()==='a') keys.a = false;
        if(e.key.toLowerCase()==='d') keys.d = false;
        if(e.code==='Space') keys.space = false;
    });
</script>
</body>
</html>
